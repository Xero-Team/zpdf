name: Publish (crates.io)

# Publishes every publishable workspace crate to crates.io when a version tag
# is pushed (e.g. `git tag v0.4.0 && git push origin v0.4.0`), after the full
# CI gate passes. `cargo publish --workspace` (Cargo ≥ 1.90) resolves the
# dependency order automatically and skips `publish = false` crates
# (zpdf-viewer-gpui, which carries git dependencies crates.io forbids).
#
# Authentication, in order of preference:
#  1. Trusted Publishing (OIDC) — once each crate exists on crates.io,
#     configure it under the crate's Settings → Trusted Publishing with
#     repository `Xero-Team/zpdf` and workflow `publish.yml`, then DELETE the
#     CARGO_REGISTRY_TOKEN secret. The workflow mints a short-lived token via
#     rust-lang/crates-io-auth-action.
#  2. Classic API token — required for the FIRST publish of each crate
#     (crates.io only lets you configure Trusted Publishing for existing
#     crates). Create a token at https://crates.io/settings/tokens with the
#     `publish-new` + `publish-update` scopes and store it as the
#     `CARGO_REGISTRY_TOKEN` repository secret.
#
# A manual dry run is available from the Actions tab (workflow_dispatch):
# it packages + verifies everything without uploading and needs no token.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Package and verify only (no upload)"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # OIDC token exchange for Trusted Publishing

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: gate (version + fmt + clippy + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig-dev \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev

      - name: Tag must match the workspace version
        if: github.ref_type == 'tag'
        run: |
          versions=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '[.packages[].version] | unique')
          count=$(echo "$versions" | jq 'length')
          version=$(echo "$versions" | jq -r '.[0]')
          if [ "$count" != "1" ]; then
            echo "::error::workspace crates disagree on version: $versions"
            exit 1
          fi
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME != workspace version v$version"
            exit 1
          fi

      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  publish:
    name: cargo publish --workspace
    needs: verify
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Dry run (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run
        run: cargo publish --workspace --dry-run

      # Trusted Publishing: only attempted when no classic token secret is
      # configured. The step itself fails if the crates aren't (yet) set up
      # for it on crates.io — bootstrap with CARGO_REGISTRY_TOKEN instead.
      - name: Check for a classic token secret
        id: token
        if: github.ref_type == 'tag' || !inputs.dry-run
        env:
          SECRET_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: echo "has_secret=${SECRET_TOKEN:+true}" >> "$GITHUB_OUTPUT"

      - name: Mint a Trusted Publishing token (OIDC)
        id: auth
        if: steps.token.outcome == 'success' && steps.token.outputs.has_secret != 'true'
        uses: rust-lang/crates-io-auth-action@v1

      # crates.io rate-limits NEW crates to a burst of ~5, then 1 per 10
      # minutes (https://crates.io/docs/rate-limits) — too tight for a
      # 13-crate workspace. And cargo hard-fails when any selected crate is
      # already published, so a naive re-run cannot resume a partial publish.
      # This loop therefore (a) excludes crates whose name@version already
      # exists on the sparse index, and (b) on 429 sleeps until the retry
      # time the server states, then resumes. Version bumps of existing
      # crates fall under the much higher 30-crate burst and finish in one
      # pass.
      - name: Publish (resumable, rate-limit aware)
        if: github.ref_type == 'tag' || !inputs.dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || steps.auth.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          meta=$(cargo metadata --no-deps --format-version 1)
          version=$(echo "$meta" | jq -r '.packages[0].version')
          # publish == null means unrestricted; [] means publish = false.
          mapfile -t crates < <(echo "$meta" | jq -r '.packages[] | select(.publish == null) | .name')

          index_path() {
            local n=$1
            case ${#n} in
              1) echo "1/$n" ;;
              2) echo "2/$n" ;;
              3) echo "3/${n:0:1}/$n" ;;
              *) echo "${n:0:2}/${n:2:2}/$n" ;;
            esac
          }

          for attempt in $(seq 1 40); do
            excludes=()
            remaining=()
            for c in "${crates[@]}"; do
              if curl -fsSL "https://index.crates.io/$(index_path "$c")" 2>/dev/null \
                   | grep -q "\"vers\":\"$version\""; then
                excludes+=(--exclude "$c")
              else
                remaining+=("$c")
              fi
            done

            if [ ${#remaining[@]} -eq 0 ]; then
              echo "all ${#crates[@]} crates already published at $version"
              exit 0
            fi
            echo "attempt $attempt: publishing ${#remaining[@]} crate(s): ${remaining[*]}"

            set +e
            out=$(cargo publish --workspace "${excludes[@]}" 2>&1 | tee /dev/stderr)
            status=$?
            set -e
            [ $status -eq 0 ] && exit 0

            if grep -q "429 Too Many Requests" <<<"$out"; then
              # "Please try again after Thu, 11 Jun 2026 15:54:55 GMT"
              retry_at=$(grep -oE 'try again after [A-Za-z]+, [0-9]{1,2} [A-Za-z]+ [0-9]{4} [0-9:]{8} GMT' <<<"$out" \
                | head -1 | sed 's/^try again after //')
              now=$(date -u +%s)
              target=$(date -u -d "$retry_at" +%s 2>/dev/null || echo $((now + 600)))
              wait=$((target - now + 30))
              [ "$wait" -lt 30 ] && wait=30
              [ "$wait" -gt 1800 ] && wait=1800
              echo "crates.io rate limit; sleeping ${wait}s (server says: ${retry_at:-unknown})"
              sleep "$wait"
              continue
            fi

            # cargo's multi-package publish can abort with an internal error
            # ("no packages ready to publish ... awaiting confirmation",
            # rust-lang/cargo scheduler bug seen on 1.96) while its uploads
            # are still propagating to the index. Progress persists on the
            # registry, so re-resolve the published set and resume. The same
            # recovery covers index lag making our probe miss a crate that
            # cargo then reports as "already exists".
            if grep -Eq "no packages ready to publish|unexpected cargo internal error|already exists on" <<<"$out"; then
              echo "transient publish failure; re-resolving published crates in 60s"
              sleep 60
              continue
            fi

            echo "::error::publish failed for a reason other than rate limiting"
            exit $status
          done
          echo "::error::rate-limit retries exhausted"
          exit 1
